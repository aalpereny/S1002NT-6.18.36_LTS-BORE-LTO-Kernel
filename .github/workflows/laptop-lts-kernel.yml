name: Build Laptop LTS Kernel

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-24.04
    name: build-laptop-lts-6-18-36

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev libelf-dev clang llvm lld bc cpio kmod

    - name: Clone Linux Kernel Source
      run: |
        # v6.18.36 sürümünü linux-source klasörüne çekiyoruz
        git clone --depth=1 --branch v6.18.36 https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git linux-source

    - name: Configure Kernel (localmodconfig)
      run: |
        cd linux-source
        # Varsayılan x86_64 şablonunu oluştur
        make defconfig
        
        # lsmod.txt dosyasını kopyala ve CI'ın takılmaması için otomatik onay (yes "") ile buda
        cp ../lsmod.txt .
        yes "" | make LSMOD=lsmod.txt localmodconfig

    - name: Compile Kernel with LLVM/Clang
      run: |
        cd linux-source
        # İşlemci çekirdek sayısına göre hızlıca derle
        make -j$(nproc) LLVM=1 bzImage modules

    - name: Prepare Arch Linux Compatible Artifact Directory
      run: |
        # Çıktıların toplanacağı temiz bir klasör oluşturuyoruz
        mkdir -p kernel-artifacts
        
        cd linux-source
        # Çekirdek imajını, config ve System.map dosyalarını kopyala
        cp arch/x86/boot/bzImage ../kernel-artifacts/vmlinuz-linux-laptop
        cp .config ../kernel-artifacts/config-linux-laptop
        cp System.map ../kernel-artifacts/System.map-linux-laptop
        
        # Derlenen tüm modülleri bu klasörün içine yapılandırarak yükle
        make LLVM=1 modules_install INSTALL_MOD_PATH=../kernel-artifacts

    - name: Upload Kernel Artifacts to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: laptop-lts-kernel-package
        path: kernel-artifacts/
        if-no-files-found: error
